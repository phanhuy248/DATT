spring.datasource.url=jdbc:h2:mem:smartshop_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.cache.type=simple
spring.data.redis.repositories.enabled=false

app.jwt.secret=test-smartshop-secret-key-2026-long-enough-for-hmac-signing-64chars
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.upload.dir=${java.io.tmpdir}/smartshop-test-uploads
app.cors.allowed-origins=http://localhost:3000

app.mail.enabled=false
app.gemini.api-key=
app.oauth2.google.client-id=
app.oauth2.google.client-secret=

app.seed.enabled=false
app.demo-users.enabled=false
app.product-sync.enabled=false
app.product-sync.run-on-startup=false
