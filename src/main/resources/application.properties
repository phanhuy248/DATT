server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/smartshop?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=${JWT_SECRET:smartshop-secret-key-2024-very-long-and-secure-key-for-jwt}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Upload directory
app.upload.dir=${UPLOAD_DIR:uploads}

# CORS allowed origins
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Gemini API (native REST)
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.5-flash

# Mail (optional; when disabled/unconfigured, mail content is logged)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=${MAIL_ENABLED:false}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Registration OTP
app.registration.otp.expiration-minutes=${REGISTRATION_OTP_EXPIRATION_MINUTES:10}
app.registration.otp.max-attempts=${REGISTRATION_OTP_MAX_ATTEMPTS:5}
# Keep "gmail.com" to require Gmail accounts; set empty to allow every email domain.
app.registration.otp.allowed-email-domain=${REGISTRATION_EMAIL_DOMAIN:gmail.com}

# Google OAuth2 Login
# OAuth2 Login is enabled automatically when both Google credentials are set.
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth2.frontend-redirect-uri=${OAUTH2_FRONTEND_REDIRECT_URI:http://localhost:3000/oauth2/callback}
app.oauth2.frontend-profile-completion-uri=${OAUTH2_FRONTEND_PROFILE_COMPLETION_URI:http://localhost:3000/oauth2/complete-profile}
app.oauth2.profile-completion-expiration-minutes=${OAUTH2_PROFILE_COMPLETION_EXPIRATION_MINUTES:15}

# Redis Cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false
spring.cache.type=redis

logging.level.org.springframework.security=WARN

# Data Seed (DummyJSON)
app.seed.enabled=${SEED_ENABLED:true}
app.demo-users.enabled=${DEMO_USERS_ENABLED:true}
app.seed.dummyjson.base-url=https://dummyjson.com
app.seed.price-multiplier=${SEED_PRICE_MULTIPLIER:25000}

# Product crawler/import
app.import.download-images=${IMPORT_DOWNLOAD_IMAGES:true}
app.product-sync.enabled=${PRODUCT_SYNC_ENABLED:false}
app.product-sync.run-on-startup=${PRODUCT_SYNC_RUN_ON_STARTUP:false}
app.product-sync.file=${PRODUCT_SYNC_FILE:crawler/output/products.json}
app.product-sync.command=${PRODUCT_SYNC_COMMAND:}
app.product-sync.working-dir=${PRODUCT_SYNC_WORKING_DIR:crawler}
app.product-sync.command-timeout-minutes=${PRODUCT_SYNC_COMMAND_TIMEOUT_MINUTES:30}
app.product-sync.cron=${PRODUCT_SYNC_CRON:0 0 3 * * *}
app.product-sync.zone=${PRODUCT_SYNC_ZONE:Asia/Ho_Chi_Minh}
