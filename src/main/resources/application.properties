server.port=8080
spring.config.import=optional:file:.env[.properties]

# Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/smartshop?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — dùng validate để Hibernate KHÔNG tự thay đổi schema (Flyway quản lý)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway database migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true: nếu DB đã có sẵn tables (do ddl-auto=update trước đây),
# Flyway sẽ đánh dấu đó là baseline version=1 thay vì cố chạy lại V1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# Upload directory
app.upload.dir=${UPLOAD_DIR:uploads}

# CORS allowed origins
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Gemini API (native REST)
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.5-flash

# Mail (optional; when disabled/unconfigured, mail content is logged)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.enabled=${MAIL_ENABLED:false}
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# VNPAY payment gateway
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.vnpay.return-url=${VNPAY_RETURN_URL:${app.backend.url}/api/payments/vnpay/return}
app.vnpay.ipn-url=${VNPAY_IPN_URL:${app.backend.url}/api/payments/vnpay/ipn}
# expire-minutes chỉ dùng để set thời hạn link trên cổng VNPAY (không phải auto-cancel)
app.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:5}

# SePay automatic bank transfer confirmation
# Webhook: POST /api/payments/sepay/webhook (Authorization: Apikey <SEPAY_API_KEY>)
# QR động: https://qr.sepay.vn/img (dùng BANK_TRANSFER_BANK_ID làm mã ngân hàng)
app.sepay.api-key=${SEPAY_API_KEY:}

# Manual bank transfer QR (VietQR quick image)
app.bank-transfer.qr-image-base-url=${BANK_TRANSFER_QR_IMAGE_BASE_URL:https://img.vietqr.io/image}
app.bank-transfer.bank-id=${BANK_TRANSFER_BANK_ID:}
app.bank-transfer.bank-name=${BANK_TRANSFER_BANK_NAME:}
app.bank-transfer.account-number=${BANK_TRANSFER_ACCOUNT_NUMBER:}
app.bank-transfer.account-name=${BANK_TRANSFER_ACCOUNT_NAME:}
app.bank-transfer.branch=${BANK_TRANSFER_BRANCH:}
app.bank-transfer.template=${BANK_TRANSFER_QR_TEMPLATE:compact2}

# ── Tự động hủy đơn PENDING_PAYMENT sau N phút (VNPAY + BANK_TRANSFER) ──────
# Scheduler chạy mỗi 1 phút; default 5 phút theo nghiệp vụ thực tế
app.order.pending-payment-expire-minutes=${PENDING_PAYMENT_EXPIRE_MINUTES:5}
app.order.pending-payment-expire-cron=${PENDING_PAYMENT_EXPIRE_CRON:0 * * * * *}
app.order.pending-payment-expire-zone=${PENDING_PAYMENT_EXPIRE_ZONE:Asia/Ho_Chi_Minh}

# Registration OTP
app.registration.otp.expiration-minutes=${REGISTRATION_OTP_EXPIRATION_MINUTES:10}
app.registration.otp.max-attempts=${REGISTRATION_OTP_MAX_ATTEMPTS:5}
# Keep "gmail.com" to require Gmail accounts; set empty to allow every email domain.
app.registration.otp.allowed-email-domain=${REGISTRATION_EMAIL_DOMAIN:gmail.com}

# Google OAuth2 Login
# OAuth2 Login is enabled automatically when both Google credentials are set.
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth2.frontend-redirect-uri=${OAUTH2_FRONTEND_REDIRECT_URI:http://localhost:3000/oauth2/callback}
app.oauth2.frontend-profile-completion-uri=${OAUTH2_FRONTEND_PROFILE_COMPLETION_URI:http://localhost:3000/oauth2/complete-profile}
app.oauth2.profile-completion-expiration-minutes=${OAUTH2_PROFILE_COMPLETION_EXPIRATION_MINUTES:15}

# Redis Cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false
spring.cache.type=redis

logging.level.org.springframework.security=WARN

# Swagger / OpenAPI — truy cập tại http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Data Seed (DummyJSON)
app.seed.enabled=${SEED_ENABLED:true}
app.demo-users.enabled=${DEMO_USERS_ENABLED:true}
app.demo-content.enabled=${DEMO_CONTENT_ENABLED:true}
app.seed.dummyjson.base-url=https://dummyjson.com
app.seed.price-multiplier=${SEED_PRICE_MULTIPLIER:25000}

# Product crawler/import
app.import.download-images=${IMPORT_DOWNLOAD_IMAGES:true}
app.product-sync.enabled=${PRODUCT_SYNC_ENABLED:false}
app.product-sync.run-on-startup=${PRODUCT_SYNC_RUN_ON_STARTUP:false}
app.product-sync.file=${PRODUCT_SYNC_FILE:crawler/output/products.json}
app.product-sync.command=${PRODUCT_SYNC_COMMAND:}
app.product-sync.working-dir=${PRODUCT_SYNC_WORKING_DIR:crawler}
app.product-sync.command-timeout-minutes=${PRODUCT_SYNC_COMMAND_TIMEOUT_MINUTES:30}
app.product-sync.cron=${PRODUCT_SYNC_CRON:0 0 3 * * *}
app.product-sync.zone=${PRODUCT_SYNC_ZONE:Asia/Ho_Chi_Minh}
